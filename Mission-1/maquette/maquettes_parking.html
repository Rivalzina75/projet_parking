    items.map(([l,a])=>'<div style="padding:7px 10px;border-radius:6px;font-size:13px;'+(a?'background:'+col[ac]+';color:white;':'color:var(--color-text-secondary);')+'margin-bottom:4px;cursor:pointer;">'+l+'</div>').join('')+
    '<div style="padding:7px 10px;border-radius:6px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;margin-top:auto;">Déconnexion</div>'+
  '</div>';
};

const row = (cells, hd) => '<tr style="'+(hd?'background:var(--color-background-secondary);':'border-top:0.5px solid var(--color-border-tertiary);')+'">' +

const tbl = (headers, rows) => '<div style="border:0.5px solid var(--color-border-tertiary);border-radius:8px;overflow:hidden;"><table style="width:100%;border-collapse:collapse;font-size:13px;"><thead>' + row(headers, true) + '</thead><tbody>' + rows + '</tbody></table></div>';

const badge = (t, bg, tx) => '<span style="padding:2px 8px;border-radius:4px;font-size:11px;background:'+bg+';color:'+tx+';">'+t+'</span>';

const btn = (t, bg, bd, tx, extra) => '<button style="padding:'+(extra||'6px 14px')+';border-radius:6px;border:0.5px solid '+bd+';background:'+bg+';color:'+tx+';cursor:pointer;font-size:12px;">' + t + '</button>';

accueil: () => frm('https://parking.fr/accueil',

function gp(el) {
  const pg = el.dataset.page;
  const sec = el.dataset.sec;
  const cols = {pub:'#185FA5',usr:'#3B6D11',adm:'#854F0B'};
  document.querySelectorAll('.npb').forEach(b => {
    const bs = b.dataset.sec;
    const isA = b.dataset.page === pg;
    b.style.background = isA ? cols[bs] : 'transparent';
    b.style.color = isA ? 'white' : cols[bs];
    b.style.borderColor = isA ? 'transparent' : cols[bs];
    b.style.border = '0.5px solid ' + (isA ? 'transparent' : cols[bs]);
  });
  document.getElementById('pc').innerHTML = pages[pg]();
}

document.querySelector('[data-page="accueil"]').style.background = '#185FA5';
document.querySelector('[data-page="accueil"]').style.color = 'white';
document.getElementById('pc').innerHTML = pages['accueil']();
</script>
</div>
